name: Auto Repair CI

on:
  workflow_dispatch:
  pull_request:

jobs:
  repair-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run auto repair ci
        run: npm run auto:repair:ci

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: reports/npm-audit-report.json
          if-no-files-found: warn
