name: Backend Auto Maintenance

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-auto-maintenance
  cancel-in-progress: true

jobs:
  maintain-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend maintenance pipeline
        run: npm run auto:pau-na-maquina
