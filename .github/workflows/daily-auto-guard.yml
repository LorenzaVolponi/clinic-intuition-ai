name: Daily Auto Guard

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  auto-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run automated guard cycle
        run: bash scripts/auto-guard.sh --once

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-guard-logs
          path: logs/
